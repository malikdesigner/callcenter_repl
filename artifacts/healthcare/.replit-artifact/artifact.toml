kind = "web"
previewPath = "/"
title = "MediFlow — AI Healthcare Platform"
version = "1.0.0"
id = "artifacts/healthcare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22352

[services.development]
run = "pnpm --filter @workspace/healthcare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/healthcare", "run", "build" ]
publicDir = "artifacts/healthcare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22352"
BASE_PATH = "/"
